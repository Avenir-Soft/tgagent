<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1400" />
<title>AI Closer · UX Audit & Redesign</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f2ec; --paper-2:#faf8f2; --ink:#141210; --ink-2:#5a544c; --ink-3:#8a847a;
    --line:#e3dfd4; --hair:#ded8c9;
    --ink-blue:#1e3a5f; --signal-good:#2f6a3f; --signal-warn:#a36300; --signal-bad:#9c2a2a;
  }
  html,body{background:var(--paper);color:var(--ink);font-family:'Geist',system-ui,sans-serif;font-feature-settings:"ss01","cv11"}
  .serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400}
  .mono{font-family:'Geist Mono',ui-monospace,monospace}
  .tnum{font-variant-numeric:tabular-nums}
  .hair{border-color:var(--hair)}
  .editorial-rule{height:1px;background:var(--ink);opacity:.85}
  .e-panel{background:#fff;border:1px solid var(--line)}
  .e-accent{color:var(--ink-blue)}
  .e-line{border-color:var(--line)}
  .e-ink-2{color:var(--ink-2)} .e-ink-3{color:var(--ink-3)}
  .kbd{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;padding:1px 5px;border-radius:4px;border:1px solid #0002;display:inline-flex;align-items:center;gap:2px}
  code{font-family:'Geist Mono',ui-monospace,monospace;font-size:.9em;background:#0000000d;padding:1px 5px;border-radius:3px}

  /* direction subtrees */
  .dir-cockpit  { --accent:#22d3ee; }
  .dir-editorial{ --accent:#1e3a5f; }
  .dir-terminal { --accent:#ffb020; }
  .c-panel{background:#13171c;border:1px solid #22272e}
  .c-line{border-color:#22272e}
  .c-accent{color:#22d3ee} .c-ink{color:#e6e8eb} .c-ink-2{color:#a7acb4} .c-ink-3{color:#6b7280}
  .t-panel{background:#0f0f0c;border:1px solid #1e1e18}
  .t-line{border-color:#1e1e18}
  .t-accent{color:#ffb020} .t-ink{color:#ddd6b8} .t-ink-2{color:#9a9270} .t-ink-3{color:#5e5a45}

  /* cockpit grid bg */
  .cockpit-grid{background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:24px 24px}
  .ph-stripes{background-image:repeating-linear-gradient(45deg,transparent 0 6px,rgba(255,255,255,.02) 6px 12px)}

  /* reveal */
  [data-reveal]{opacity:0;transform:translateY(6px);transition:opacity .5s ease,transform .5s ease}
  [data-reveal].in{opacity:1;transform:none}

  .hidden{display:none!important}

  /* nav */
  #nav .tab-btn{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;padding:6px 12px;border-radius:6px;transition:all .15s}
  #nav .tab-btn:hover{background:#00000010}
  #dirSwitch button, #tweakDir button, #tweakDensity button, #tweakSidebar button{font-size:10.5px;padding:5px 10px;border-radius:5px;transition:all .15s;border:1px solid transparent}
  #dirSwitch button:hover, #tweakDir button:hover{background:#00000010}

  body[data-density="compact"] .tab-panel .grid-cols-12 > *{padding-top:.25rem}
</style>
</head>
<body>

<!-- masthead bar -->
<header class="sticky top-0 z-40" style="background:rgba(244,242,236,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)">
  <div class="max-w-[1400px] mx-auto px-6 h-12 flex items-center gap-6">
    <div class="flex items-baseline gap-3">
      <span class="serif text-[22px] leading-none">AI Closer</span>
      <span class="mono text-[10px] uppercase tracking-[0.2em] text-[#8a847a]">ux audit · redesign</span>
    </div>

    <nav id="nav" class="flex items-center gap-1 ml-4">
      <button class="tab-btn" data-tab="audit">Анализ</button>
      <button class="tab-btn" data-tab="system">Система</button>
      <button class="tab-btn" data-tab="mocks">Мокапы</button>
      <button class="tab-btn" data-tab="proto">Прототип</button>
      <button class="tab-btn" data-tab="full">Full Redesign</button>
    </nav>

    <div class="ml-auto flex items-center gap-3">
      <span class="mono text-[10px] uppercase tracking-[0.18em] text-[#8a847a]">direction</span>
      <div id="dirSwitch" class="flex items-center gap-1 rounded-md" style="border:1px solid var(--line);padding:2px">
        <button data-dir="cockpit">Cockpit</button>
        <button data-dir="editorial">Editorial</button>
        <button data-dir="terminal">Terminal</button>
      </div>
    </div>
  </div>
</header>

<!-- tweaks state -->
<script>
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "direction": "editorial",
  "density": "compact",
  "sidebar": "wide",
  "defaultTab": "full"
}/*EDITMODE-END*/;
</script>

<main class="px-6 py-10">
  <section id="tab-audit"  class="tab-panel"></section>
  <section id="tab-system" class="tab-panel hidden"></section>
  <section id="tab-mocks"  class="tab-panel hidden"></section>
  <section id="tab-proto"  class="tab-panel hidden"></section>
  <section id="tab-full"   class="tab-panel hidden"></section>
</main>

<!-- tweaks panel -->
<button id="tweaksOpen" class="fixed bottom-4 right-4 rounded-full w-11 h-11 flex items-center justify-center shadow-lg hidden z-50"
        style="background:#141210;color:#faf8f2">⚙</button>
<aside id="tweaks" class="fixed bottom-4 right-4 w-[280px] rounded-lg shadow-xl hidden z-50"
       style="background:#faf8f2;border:1px solid var(--line)">
  <div class="flex items-center justify-between px-4 py-3" style="border-bottom:1px solid var(--line)">
    <span class="mono text-[10px] uppercase tracking-[0.18em] text-[#5a544c]">Tweaks</span>
    <button id="tweaksClose" class="text-[14px] text-[#8a847a]">×</button>
  </div>
  <div class="p-4 space-y-4 text-[12px]">
    <div>
      <div class="mono text-[9px] uppercase tracking-[0.2em] text-[#8a847a] mb-1.5">Направление</div>
      <div id="tweakDir" class="flex gap-1 rounded-md" style="border:1px solid var(--line);padding:2px">
        <button data-dir="cockpit" class="flex-1">Cockpit</button>
        <button data-dir="editorial" class="flex-1">Editorial</button>
        <button data-dir="terminal" class="flex-1">Terminal</button>
      </div>
    </div>
    <div>
      <div class="mono text-[9px] uppercase tracking-[0.2em] text-[#8a847a] mb-1.5">Плотность</div>
      <div id="tweakDensity" class="flex gap-1 rounded-md" style="border:1px solid var(--line);padding:2px">
        <button data-d="compact" class="flex-1">Compact</button>
        <button data-d="cozy" class="flex-1">Cozy</button>
      </div>
    </div>
    <div>
      <div class="mono text-[9px] uppercase tracking-[0.2em] text-[#8a847a] mb-1.5">Сайдбар (в прототипе)</div>
      <div id="tweakSidebar" class="flex gap-1 rounded-md" style="border:1px solid var(--line);padding:2px">
        <button data-s="wide" class="flex-1">Wide</button>
        <button data-s="icon" class="flex-1">Icon</button>
      </div>
    </div>
    <div class="text-[10.5px] text-[#8a847a] leading-snug pt-2" style="border-top:1px solid var(--line)">
      Подсказка: переключайте Direction сверху справа, а плотность и сайдбар — здесь. Всё сохраняется.
    </div>
  </div>
</aside>


<script>
/* === audit.js === */
/* -------- audit.js — written UX critique -------- */
window.buildAudit = function (root) {
  root.innerHTML = `
  <div class="max-w-[880px] mx-auto">

    <!-- masthead -->
    <div class="mb-12" data-reveal>
      <div class="text-[10.5px] font-semibold tracking-[0.18em] uppercase text-[#8a847a] mb-3">UX Audit · v1</div>
      <h1 class="serif text-[72px] leading-[0.96] tracking-tight">
        AI Closer панель.<br/>
        <span class="italic text-[#5a544c]">Что хорошо, что мешает,</span><br/>
        и почему «не нравится».
      </h1>
      <div class="mt-6 text-[14px] text-[#5a544c] max-w-[640px] leading-relaxed">
        Панель уже <em>не плохая</em> — у неё есть стиль, сетка, тёмный режим.
        Но ощущение «ничего не так, но бесит» обычно значит: <b>нет иерархии, слишком много украшений,
        и рабочая плотность ниже, чем нужно админу, который сам — единственный пользователь.</b>
        Ниже — разбор по пунктам и что с этим делать.
      </div>
      <div class="mt-6 flex items-center gap-4 text-[11px] text-[#8a847a]">
        <span>Stack: Next.js 15 · React 19 · Tailwind 4 · Inter</span>
        <span>·</span>
        <span>Screens: 7 platform routes + auth</span>
        <span>·</span>
        <span>User: 1 (super admin)</span>
      </div>
    </div>

    <div class="editorial-rule mb-12"></div>

    <!-- TL;DR -->
    <section class="mb-16" data-reveal>
      <div class="grid grid-cols-12 gap-8">
        <div class="col-span-3">
          <div class="text-[10.5px] font-semibold tracking-[0.18em] uppercase text-[#8a847a]">§ 01</div>
          <div class="serif text-[28px] leading-tight mt-1">TL;DR</div>
        </div>
        <div class="col-span-9 space-y-4 text-[15px] leading-[1.65]">
          <p>Шесть вещей, которые ломают ощущение:</p>
          <ol class="space-y-3 pl-6" style="list-style: decimal;">
            <li><b>Градиенты везде.</b> Логотип, primary‑кнопка, полосы графика, акцентный stat‑блок — всё в indigo→violet.
              Это 2023‑й «AI SaaS» шаблон. Устаревает быстрее, чем кажется.</li>
            <li><b>Сайдбар — всегда чёрный.</b> Даже в светлой теме. Получается «две программы в одной».</li>
            <li><b>Карточки слишком пухлые.</b> На экране Обзор — пять больших stat‑карт
              с гигантскими иконками, а внутри — «0», «0», «0». Админ‑панель должна смотреться как кабина, не как лендинг.</li>
            <li><b>Нет иерархии.</b> Все заголовки разделов — <code>text-sm font-semibold text-slate-700</code>.
              Глазу не за что зацепиться.</li>
            <li><b>Статусные чипы слабо читаются.</b> <code>bg-*-50 + text-*-700 + border-*-200</code> даёт
              «нежные» метки — но это админ‑статусы, они должны быть сигналами.</li>
            <li><b>Нет типографической тонкой настройки.</b> Inter везде, без tabular‑nums,
              без контраста между числами и подписями. Цифры — главное на этой панели, а выглядят как обычный текст.</li>
          </ol>
          <p class="text-[#5a544c] italic pt-2">Всё это — исправляется. И ни одно исправление не требует перевёрстки. Ниже — карта.</p>
        </div>
      </div>
    </section>

    <!-- Heuristic sweep -->
    <section class="mb-16" data-reveal>
      <div class="grid grid-cols-12 gap-8">
        <div class="col-span-3">
          <div class="text-[10.5px] font-semibold tracking-[0.18em] uppercase text-[#8a847a]">§ 02</div>
          <div class="serif text-[28px] leading-tight mt-1">Эвристика по экранам</div>
        </div>
        <div class="col-span-9 space-y-8">
          ${[
            {
              name: 'Обзор (platform-overview)',
              good: [
                'Правильный набор метрик: тенанты, пользователи, сообщения 24ч, заказы, выручка.',
                'Есть график сообщений за 7 дней.',
                'Блок состояния системы (PG/Redis/TG/Backend) — это редко делают, и это правильно.',
              ],
              bad: [
                'Первое, что видит админ — пять «0» в больших рамках. Нужно показывать контекст: Δ vs вчера, sparkline, последнее событие.',
                'График не имеет оси Y, сетки, hover‑tooltip. Числа нарисованы поверх баров и перекрываются.',
                'Blок «Метрики платформы» — просто пары «ключ: значение». Дублирует stat‑карты, но хуже.',
                'Нет ссылки «посмотреть все» / drill‑down в stat‑картах (клик не ведёт никуда).',
              ],
            },
            {
              name: 'Тенанты (platform-tenants)',
              good: [
                'Есть поиск, сортировка, пагинация, bulk‑действия, модалка создания — полный джентльменский набор.',
                'Статусы с цветом и локализацией.',
                'Кнопка «Войти как Admin» — сильная фича, редко реализуется.',
              ],
              bad: [
                'Таблица 9 колонок без визуальной структуры — название+slug можно объединить в «identity‑колонку».',
                'Цифры «Товары/Диалоги/Пользователи» в центр‑выравнивании без tabular‑nums — прыгают от строки к строке.',
                'Пагинация: Назад · [1] · Вперёд. Нет «строк на странице», нет перехода к последней.',
                'Create‑модалка — 4 поля подряд без группировки. «Тенант» и «Первый админ» — это две разные вещи.',
              ],
            },
            {
              name: 'Пользователи (platform-users)',
              good: [
                'Фильтры по тенанту и роли, поиск, сортировка, bulk‑активировать/деактивировать.',
                'Edit/Create через одну модалку — чисто.',
              ],
              bad: [
                'Кружок‑тумблер для is_active внутри модалки — хорошо, но в таблице статус — точка + слово. Разные паттерны для одного свойства.',
                'Chip для роли — три разных оттенка (violet/indigo/slate). super_admin=violet, store_owner=indigo — глаз не отличит с первого взгляда.',
                'Ширина email‑колонки фиксированная → длинные email обрезаются без title.',
              ],
            },
            {
              name: 'AI Монитор (platform-ai-monitor)',
              good: [
                'Авто‑обновление 15с с индикатором — отлично.',
                'KPI‑карты цветом по порогу (время < 1с / < 5с / > 5с) — правильный сигнал.',
                'Лог с колонками «инструменты», «токены», «время» — всё нужное.',
              ],
              bad: [
                'Колонка «Статус» показывает <i>модель</i>, не статус. Лейбл врёт.',
                'Для строки в логе нет «раскрыть детали» — только truncate сообщения. Для разбора проблем нужен drawer с полным promt/response/trace.',
                'Фильтр «все/успешные/ошибки/fallback» не работает на backend (клиентский filter по logs). Выглядит функцией, но молчит.',
                'KPI «Проблемные %» определяется как «> 10с ИЛИ без tools». Это не «проблемные» — это грубая эвристика. Нужны явные флаги: timeout, tool_error, fallback.',
              ],
            },
            {
              name: 'Биллинг (platform-billing)',
              good: [
                'Есть диапазон дат, сводные KPI, построчная разбивка по тенантам.',
                'Оценка стоимости — полезна.',
              ],
              bad: [
                'Формула «~500 tok/call × $0.15/1M» захардкожена в UI. Если модель сменится — цифра станет вводящей в заблуждение.',
                'Нет экспорта (CSV/PDF). Биллинг без экспорта — неполный.',
                'Нет графика по дням / по тенантам — только таблица.',
              ],
            },
            {
              name: 'Логи (platform-logs)',
              good: [
                'Цветные chip‑ы по типу действия, раскрытие meta_json по клику.',
                'Фильтры по тенанту и действию.',
              ],
              bad: [
                'Раскрытая строка меняет высоту таблицы рывком — нет плавности.',
                'Нет поиска по actor_id/entity_id/trace_id. Для audit log это ключевая функция.',
                'Нет быстрого фильтра «сегодня / 24ч / 7д».',
              ],
            },
            {
              name: 'Настройки (platform-settings)',
              good: [
                'Хорошая форма с три‑колонной разметкой (label + description слева, control справа).',
                'Явное предупреждение при включённом maintenance_mode.',
              ],
              bad: [
                '«Сохранить» — один на всю форму. Если ошибка в одном поле — непонятно в каком.',
                'Нет «сбросить к значениям по умолчанию».',
                'Тумблер maintenance_mode — одного ранга с «макс. товаров на тенант». Это крит‑действие, должно быть отделено визуально.',
              ],
            },
          ].map((s, i) => `
            <article class="grid grid-cols-12 gap-6 pb-8 ${i < 6 ? 'border-b hair' : ''}">
              <div class="col-span-12">
                <div class="flex items-baseline justify-between">
                  <h3 class="serif text-[24px] leading-tight">${s.name}</h3>
                  <span class="mono text-[10px] text-[#8a847a] tracking-wider uppercase">screen ${String(i+1).padStart(2,'0')}/07</span>
                </div>
              </div>
              <div class="col-span-6">
                <div class="mono text-[10px] uppercase tracking-[0.15em] text-[#2f6a3f] mb-2">+ Работает</div>
                <ul class="text-[13.5px] leading-[1.6] space-y-1.5">
                  ${s.good.map(g => `<li class="flex gap-2"><span class="text-[#2f6a3f] select-none">+</span><span>${g}</span></li>`).join('')}
                </ul>
              </div>
              <div class="col-span-6">
                <div class="mono text-[10px] uppercase tracking-[0.15em] text-[#9c2a2a] mb-2">− Чинить</div>
                <ul class="text-[13.5px] leading-[1.6] space-y-1.5">
                  ${s.bad.map(b => `<li class="flex gap-2"><span class="text-[#9c2a2a] select-none">−</span><span>${b}</span></li>`).join('')}
                </ul>
              </div>
            </article>
          `).join('')}
        </div>
      </div>
    </section>

    <!-- Cross-cutting -->
    <section class="mb-16" data-reveal>
      <div class="grid grid-cols-12 gap-8">
        <div class="col-span-3">
          <div class="text-[10.5px] font-semibold tracking-[0.18em] uppercase text-[#8a847a]">§ 03</div>
          <div class="serif text-[28px] leading-tight mt-1">Сквозные проблемы</div>
        </div>
        <div class="col-span-9 space-y-6 text-[14.5px] leading-[1.65]">

          <div class="grid grid-cols-2 gap-4">
            ${[
              ['Типографика', 'Один Inter на всё, без дифференциации «число vs метка». Нет tabular‑nums в таблицах — цифры прыгают. Заголовки секций — <code>text-sm</code>, почти неотличимы от body.', 'Ввести ступени: display / title / body / meta / mono. Tabular‑nums по умолчанию для всех чисел.'],
              ['Цвет', 'Семь оттенков статусов (emerald, indigo, violet, amber, rose, blue, sky) — палитра «на всякий случай». Градиенты усиливают ощущение неуверенности.', 'Свести к 3 ролевым цветам: ink (нейтраль), accent (один), signal (ok/warn/bad). Без градиентов.'],
              ['Плотность', 'card‑padding p‑5/p‑6 везде → на 1440px влезает 5 строк таблицы без скролла. Вы — единственный пользователь, вам нужна плотность.', 'Compact‑режим по умолчанию. h‑8 строки, 12px текст. Cozy — опциональный.'],
              ['Навигация', 'Сайдбар 260px, всегда развёрнут, всегда тёмный. Занимает 18% ширины на 1440px.', 'Узкий (72px icon‑only) по умолчанию, hover‑expand. Светлый для светлой темы.'],
              ['Состояния', 'Skeleton есть. Empty state («нет тенантов. Создайте первый.») — без CTA. Error state — красный баннер, но без retry в большинстве мест.', 'Прошить единый паттерн: empty → primary CTA, error → retry, loading → skeleton с правильной формой.'],
              ['Микровзаимодействие', 'Hover‑цвет только на строках таблиц. Кнопки — transition‑colors, без press‑state.', 'Press‑feedback (scale‑0.99), focus‑ring единого цвета, cmd+K палитра для super admin.'],
            ].map(([t, problem, fix]) => `
              <div class="e-panel p-5 rounded-lg">
                <div class="serif text-[18px] leading-tight mb-2">${t}</div>
                <div class="text-[12.5px] text-[#5a544c] leading-[1.55] mb-3">${problem}</div>
                <div class="text-[11.5px] mono uppercase tracking-[0.12em] text-[#1e3a5f] mb-1">Fix</div>
                <div class="text-[12.5px] leading-[1.55]">${fix}</div>
              </div>
            `).join('')}
          </div>

        </div>
      </div>
    </section>

    <!-- Direction matrix -->

};

}

.fr-tab{padding:9px 13px;font-size:12px;color:var(--ink3);background:transparent;border:0;border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px}
.fr-tab:hover{color:var(--ink)}
.fr-tab.on{color:var(--ink);border-bottom-color:var(--accent)}

/* ai table */
.fr-ai-table tbody td{padding:8px 12px}
.fr-ai-err td{background:color-mix(in oklab, var(--bad) 6%, transparent)}

/* logs table */
.fr-logs-table tbody td{padding:9px 12px}
.fr-actor{display:flex;align-items:center;gap:8px}
.fr-log-expanded td{background:var(--bg2)}
.fr-log-detail td{padding:12px 14px !important;background:var(--bg2);border-top:1px dashed var(--line)}
.fr-detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px 30px}
.fr-detail-grid>div{display:grid;grid-template-columns:110px 1fr;align-items:center;padding-bottom:4px;border-bottom:1px dashed var(--hair)}
.fr-detail-grid dt{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.14em;font-family:'Geist Mono',monospace}
.fr-detail-grid dd{font-size:12px;margin:0}
.fr-detail-f{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:11.5px}

/* dist */
.fr-dist{display:flex;flex-direction:column;gap:6px}
.fr-dist-row{display:grid;grid-template-columns:100px 1fr 50px 60px;gap:8px;align-items:center;font-size:11.5px}
.fr-dist-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.fr-dist-bar>div{height:100%}

/* settings */
.fr-settings-layout{display:grid;grid-template-columns:180px 1fr;gap:14px}
.fr-set-nav{display:flex;flex-direction:column;gap:2px;position:sticky;top:10px;align-self:start}
.fr-set-nav a{padding:7px 10px;font-size:12px;color:var(--ink3);border-radius:6px;cursor:pointer;border-left:2px solid transparent}
.fr-set-nav a:hover{color:var(--ink);background:var(--bg2)}
.fr-set-nav a.on{color:var(--accent);border-left-color:var(--accent);background:var(--accentSoft)}
.fr-settings-body{display:flex;flex-direction:column;gap:12px}
.fr-set-row{display:grid;grid-template-columns:1fr auto;gap:20px;padding:12px 0;border-top:1px dashed var(--hair);align-items:center}
.fr-set-row:first-of-type{border-top:0;padding-top:4px}
.fr-set-t{font-size:12.5px;color:var(--ink);font-weight:500}
.fr-set-s{font-size:10.5px;color:var(--ink3);margin-top:2px;max-width:380px}
.fr-set-r{display:flex;align-items:center;gap:8px}
.fr-switch{width:36px;height:20px;border-radius:999px;background:var(--bg2);border:1px solid var(--line);position:relative;cursor:pointer}
.fr-switch::after{content:"";position:absolute;top:1px;left:1px;width:16px;height:16px;border-radius:50%;background:var(--ink3);transition:.15s}
.fr-switch.on{background:var(--accent);border-color:var(--accent)}
.fr-switch.on::after{transform:translateX(16px);background:#fff}
.fr-settings-foot{display:flex;align-items:center;justify-content:space-between;padding-top:6px}

/* modal */
.fr-page-modal-bg{position:relative;min-height:400px}
.fr-page-modal-bg::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);border-radius:8px;pointer-events:none}
.fr-modal{position:relative;max-width:480px;margin:24px auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 20px 60px -20px #000a}
.fr-modal-h{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
.fr-modal-t{font-size:15px;font-weight:600;color:var(--ink)}
.fr-modal-s{font-size:11.5px;color:var(--ink3);margin-top:3px}
.fr-modal-section{padding:12px 18px;border-bottom:1px solid var(--line)}
.fr-section-h{font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink3);font-family:'Geist Mono',monospace;margin-bottom:10px}
.fr-modal-f{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px}

/* login */
.fr-login-page{position:relative;min-height:560px;background:var(--bg);border:1px solid var(--line);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}
.fr-login-bg{position:absolute;inset:0;overflow:hidden}
.fr-login-grid{position:absolute;inset:0;background-image:linear-gradient(var(--hair) 1px,transparent 1px),linear-gradient(90deg,var(--hair) 1px,transparent 1px);background-size:36px 36px;opacity:.35}
.fr-login-glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,var(--accent) 0%,transparent 60%);opacity:.08;top:-100px;left:50%;transform:translateX(-50%)}
.fr-login-card{position:relative;width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:28px;box-shadow:0 20px 60px -20px #000c}
.fr-login-brand{text-align:center;margin-bottom:22px}
.fr-login-logo{width:42px;height:42px;border-radius:10px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:14px;font-weight:700;margin:0 auto 12px;letter-spacing:.5px}
.fr-login-t{font-size:17px;font-weight:600;color:var(--ink)}
.fr-login-s{font-size:11.5px;color:var(--ink3);margin-top:3px}
.fr-login-meta{margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;color:var(--ink3);padding-top:14px;border-top:1px dashed var(--hair)}
.fr-login-foot{position:relative;margin-top:20px;font-size:10.5px;color:var(--ink4);font-family:'Geist Mono',monospace}
`;

/* ---------- BUILD ---------- */
window.buildFull = function (root) {

  root.innerHTML = `
    <div class="max-w-[1400px] mx-auto">
      <div class="mb-4" data-reveal>
        <div class="text-[10.5px] font-semibold tracking-[0.18em] uppercase text-[#8a847a] mb-2">Full Redesign · 10 pages · dark + light</div>
        <div class="flex items-baseline justify-between gap-4 flex-wrap">
          <h2 class="serif text-[48px] leading-[1] tracking-tight">Полный редизайн</h2>
          <div class="flex items-center gap-2">
            <span class="mono text-[10px] uppercase tracking-[0.18em] text-[#8a847a]">theme</span>
            <div id="frThemeSwitch" class="flex items-center gap-1 rounded-md" style="border:1px solid var(--line);padding:2px">
              <button data-theme="dark" class="on" style="font-size:10.5px;padding:5px 10px;border-radius:5px;background:#141210;color:#faf8f2">Dark</button>
              <button data-theme="light" style="font-size:10.5px;padding:5px 10px;border-radius:5px">Light</button>
            </div>
          </div>
        </div>
        <p class="mt-3 text-[13.5px] text-[#5a544c] max-w-[720px] leading-relaxed">
          Все 10 страниц супер-админ панели в новой системе. Тёмная тема по умолчанию — как у вас сейчас,
          но с починенной иерархией, tabular‑nums, одной accent‑шкалой, осями графиков, drill‑down в KPI,
          отдельным drawer для деталей в логах и AI-мониторе. Светлая версия — один переключатель.
        </p>
      </div>

      <div id="frSubnav" class="flex items-center gap-1 flex-wrap mb-4 sticky top-12 z-30 py-2" style="background:rgba(244,242,236,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)">
        ${PAGES.map(([k,l],i) => `
          <button class="fr-subnav-b ${i===0?'on':''}" data-page="${k}">
            <span class="fr-subnav-n">${String(i+1).padStart(2,'0')}</span>
            <span>${l}</span>
          </button>`).join('')}
      </div>

      <div id="frCanvas" class="rounded-xl overflow-hidden" data-reveal></div>
    </div>

    <style>
      .fr-subnav-b{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;font-size:11px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink2);cursor:pointer;font-family:'Geist',system-ui,sans-serif}
      .fr-subnav-b:hover{background:var(--bg2);color:var(--ink)}
      .fr-subnav-b.on{background:#141210;color:#faf8f2;border-color:#141210}
      .fr-subnav-n{font-family:'Geist Mono',monospace;font-size:9.5px;opacity:.6;letter-spacing:0.12em}
      ${STYLES}
    </style>
  `;

  const canvas = root.querySelector('#frCanvas');
  let current = 'overview';
  let theme = 'dark';

  function renderPage() {
    const t = T[theme];
    canvas.innerHTML = `<div class="fr-root" style="${css(t)}">${P[current]()}</div>`;
  }

  root.querySelectorAll('#frSubnav .fr-subnav-b').forEach(b => {
    b.addEventListener('click', () => {
      root.querySelectorAll('#frSubnav .fr-subnav-b').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      current = b.dataset.page;
      renderPage();
    });
  });
  root.querySelectorAll('#frThemeSwitch button').forEach(b => {
    b.addEventListener('click', () => {
      root.querySelectorAll('#frThemeSwitch button').forEach(x => {
        x.classList.remove('on');
        x.style.background = 'transparent';
        x.style.color = 'inherit';
      });
      b.classList.add('on');
      b.style.background = '#141210'; b.style.color = '#faf8f2';
      theme = b.dataset.theme;
      renderPage();
    });
  });

  renderPage();
};

})();

</script>
<script>
/* === app.js === */
/* -------- app.js — shell wiring, direction + tweaks -------- */
(function () {
  const ROOT = document.body;
  const DIR_CLASSES = ['dir-cockpit', 'dir-editorial', 'dir-terminal'];
  const state = { ...window.TWEAK_DEFAULTS };

  function applyDirection(dir) {
    // Default doc shell always uses editorial palette (paper).
    // The per-tab content that calls .dir-xyz will switch accordingly.
    document.querySelectorAll('.tab-panel').forEach(p => {
      DIR_CLASSES.forEach(c => p.classList.remove(c));
      p.classList.add('dir-' + dir);
    });
    // mark switch buttons
    document.querySelectorAll('#dirSwitch button, #tweakDir button').forEach(b => {
      const active = b.dataset.dir === dir;
      b.style.background = active ? '#141210' : 'transparent';
      b.style.color      = active ? '#faf8f2' : '#141210';
    });
    state.direction = dir;
    window.__DIR__ = dir;
    document.dispatchEvent(new CustomEvent('dir-change', { detail: dir }));
  }

  function setTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
    const el = document.getElementById('tab-' + name);
    if (el) el.classList.remove('hidden');
    document.querySelectorAll('#nav .tab-btn').forEach(b => {
      const active = b.dataset.tab === name;
      b.style.background = active ? '#141210' : 'transparent';
      b.style.color      = active ? '#faf8f2' : '#141210';
    });
    try { localStorage.setItem('ac_tab', name); } catch (e) {}
    state.defaultTab = name;
  }

  function setDensity(d) {
    document.body.dataset.density = d;
    document.querySelectorAll('#tweakDensity button').forEach(b => {
      const active = b.dataset.d === d;
      b.style.background = active ? '#141210' : 'transparent';
      b.style.color      = active ? '#faf8f2' : '#141210';
    });
    state.density = d;
    document.dispatchEvent(new CustomEvent('density-change', { detail: d }));
  }

  function setSidebar(s) {
    document.body.dataset.sidebar = s;
    document.querySelectorAll('#tweakSidebar button').forEach(b => {
      const active = b.dataset.s === s;
      b.style.background = active ? '#141210' : 'transparent';
      b.style.color      = active ? '#faf8f2' : '#141210';
    });
    state.sidebar = s;
    document.dispatchEvent(new CustomEvent('sidebar-change', { detail: s }));
  }

  function persist() {
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: state }, '*');
    } catch (e) {}
  }

  // ---------- mount all tabs ----------
  document.addEventListener('DOMContentLoaded', () => {
    if (window.buildAudit)  window.buildAudit(document.getElementById('tab-audit'));
    if (window.buildSystem) window.buildSystem(document.getElementById('tab-system'));
    if (window.buildMocks)  window.buildMocks(document.getElementById('tab-mocks'));
    if (window.buildProto)  window.buildProto(document.getElementById('tab-proto'));
    if (window.buildFull)   window.buildFull(document.getElementById('tab-full'));

    // nav
    document.querySelectorAll('#nav .tab-btn').forEach(b => {
      b.addEventListener('click', () => { setTab(b.dataset.tab); persist(); });
    });
    document.querySelectorAll('#dirSwitch button, #tweakDir button').forEach(b => {
      b.addEventListener('click', () => { applyDirection(b.dataset.dir); persist(); });
    });
    document.querySelectorAll('#tweakDensity button').forEach(b => {
      b.addEventListener('click', () => { setDensity(b.dataset.d); persist(); });
    });
    document.querySelectorAll('#tweakSidebar button').forEach(b => {
      b.addEventListener('click', () => { setSidebar(b.dataset.s); persist(); });
    });

    // tweaks panel
    const tweaksPanel = document.getElementById('tweaks');
    const tweaksOpen  = document.getElementById('tweaksOpen');
    const tweaksClose = document.getElementById('tweaksClose');
    let tweaksEnabled = false;

    function openTweaks() { if (tweaksEnabled) { tweaksPanel.classList.remove('hidden'); tweaksOpen.classList.add('hidden'); } }
    function closeTweaks() { tweaksPanel.classList.add('hidden'); if (tweaksEnabled) tweaksOpen.classList.remove('hidden'); }
    tweaksOpen.addEventListener('click', openTweaks);
    tweaksClose.addEventListener('click', closeTweaks);

    // EDIT MODE protocol
    window.addEventListener('message', (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode')   { tweaksEnabled = true; tweaksOpen.classList.remove('hidden'); }
      if (e.data.type === '__deactivate_edit_mode') { tweaksEnabled = false; closeTweaks(); tweaksOpen.classList.add('hidden'); }
    });
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
    tweaksOpen.classList.add('hidden'); // hidden by default until host turns on

    // initial state: restore last tab if any
    let initialTab = state.defaultTab;
    try { const t = localStorage.getItem('ac_tab'); if (t) initialTab = t; } catch (e) {}
    applyDirection(state.direction);
    setDensity(state.density);
    setSidebar(state.sidebar);
    setTab(initialTab);

    // reveal on scroll
    const io = new IntersectionObserver(entries => {
      entries.forEach(x => { if (x.isIntersecting) x.target.classList.add('in'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('[data-reveal]').forEach(e => io.observe(e));
  });
})();

</script>
